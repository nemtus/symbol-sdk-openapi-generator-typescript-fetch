name: CD Publish to npm

on:
  # Automated release: pushing a `vX.Y.Z` tag (created by `npm run release:*`)
  # triggers the pipeline. The `publish` job still waits on the `release`
  # Environment approval gate before anything is published.
  push:
    tags:
      - 'v*'
  # Manual fallback.
  workflow_dispatch:

permissions:
  contents: read

# `npm ci` installs the lockfile-pinned versions regardless of age, so the local
# .npmrc cooldown (min-release-age) does not gate it — every install is instead gated
# by `npm audit`. The remaining cooldown only affects the global `npm install -g`
# tooling here, which we deliberately leave subject to it.
env:
  # `npm ci` wipes node_modules, so cache npm's download directory instead. Point it at a
  # workspace-local path that is writable in every job (including the browser-cdn container).
  NPM_CONFIG_CACHE: ${{ github.workspace }}/.npm

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        java-version: [21]
        node-version: [24.x]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: 'microsoft'
          java-version: ${{ matrix.java-version }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: 'https://registry.npmjs.org'
      - run: java -version
      - run: npm install @openapitools/openapi-generator-cli -g
      - run: openapi-generator-cli version
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        id: cache-root
        with:
          path: ${{ github.workspace }}/.npm
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-root-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-root-
      - run: npm audit --package-lock-only
      - run: npm ci
      - run: npm run openapi:fetch
      - run: npm run openapi:set:version
      - run: npm run openapi:generate
      - run: npm run build
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.java-version }}-${{ matrix.node-version }}
          path: dist/
          retention-days: 1

  test-unit:
    needs: build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        java-version: [21]
        node-version: [24.x]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.java-version }}-${{ matrix.node-version }}
          path: dist/
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        id: cache-root-test
        with:
          path: ${{ github.workspace }}/.npm
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-root-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-root-
      - run: npm audit --package-lock-only
      - run: npm ci
      - run: npm run test

  test-nodejs-javascript:
    needs: build
    runs-on: ubuntu-latest
    # Hits a live mainnet node; deterministic coverage is in test-unit, so don't
    # let external flakiness block publishing.
    continue-on-error: true

    strategy:
      matrix:
        java-version: [21]
        node-version: [24.x]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.java-version }}-${{ matrix.node-version }}
          path: dist/
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        id: cache-nodejs-javascript
        with:
          path: ${{ github.workspace }}/.npm
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-nodejs-javascript-${{ hashFiles('tests/nodejs-javascript/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-nodejs-javascript-
      - run: npm audit --package-lock-only
        working-directory: ./tests/nodejs-javascript
      - run: npm ci
        working-directory: ./tests/nodejs-javascript
      - run: npm test
        working-directory: ./tests/nodejs-javascript

  test-nodejs-typescript:
    needs: build
    runs-on: ubuntu-latest
    # Hits a live mainnet node; deterministic coverage is in test-unit, so don't
    # let external flakiness block publishing.
    continue-on-error: true

    strategy:
      matrix:
        java-version: [21]
        node-version: [24.x]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.java-version }}-${{ matrix.node-version }}
          path: dist/
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        id: cache-nodejs-typescript
        with:
          path: ${{ github.workspace }}/.npm
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-nodejs-typescript-${{ hashFiles('tests/nodejs-typescript/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-nodejs-typescript-
      - run: npm audit --package-lock-only
        working-directory: ./tests/nodejs-typescript
      - run: npm ci
        working-directory: ./tests/nodejs-typescript
      - run: npm test
        working-directory: ./tests/nodejs-typescript

  test-browser-cdn:
    needs: build
    runs-on: ubuntu-latest
    # Hits a live mainnet node; deterministic coverage is in test-unit, so don't
    # let external flakiness block publishing.
    continue-on-error: true
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
      options: --user 1001

    strategy:
      matrix:
        java-version: [21]
        node-version: [24.x]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.java-version }}-${{ matrix.node-version }}
          path: dist/
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        id: cache-browser-cdn
        with:
          path: ${{ github.workspace }}/.npm
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-browser-cdn-${{ hashFiles('tests/browser-cdn/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-browser-cdn-
      - run: npm audit --package-lock-only
        working-directory: ./tests/browser-cdn
      - run: npm ci
        working-directory: ./tests/browser-cdn
      - run: npm run test
        working-directory: ./tests/browser-cdn

  publish:
    needs: [test-unit, test-nodejs-javascript, test-nodejs-typescript, test-browser-cdn]
    runs-on: ubuntu-latest
    # Manual approval gate: configure the `release` environment with required reviewers
    # in GitHub repo settings. Also set this same environment name in the npm Trusted
    # Publisher config so only runs that passed this gate can publish.
    environment: release
    permissions:
      contents: read
      id-token: write # Required for npm Trusted Publishing (OIDC). No NPM_TOKEN needed.

    strategy:
      matrix:
        java-version: [21]
        node-version: [24.x]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: 'https://registry.npmjs.org'
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.java-version }}-${{ matrix.node-version }}
          path: dist/
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        id: cache-root-publish
        with:
          path: ${{ github.workspace }}/.npm
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-root-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-root-
      - run: npm audit --package-lock-only
      - run: npm ci
      # Trusted Publishing (OIDC) requires npm >= 11.5.1.
      - run: npm install -g npm@latest
      - run: npm --version
      # No NODE_AUTH_TOKEN: npm exchanges the GitHub OIDC token for a short-lived
      # publish credential. --provenance attaches a verifiable build provenance attestation.
      - run: npm publish --access=public --provenance
        working-directory: ./dist
