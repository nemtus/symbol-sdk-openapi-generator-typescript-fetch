name: CD Publish to npm

on:
  # Automated release: pushing a `vX.Y.Z` tag (created by `npm run release:*`)
  # triggers the pipeline. The `publish` job still waits on the `release`
  # Environment approval gate before anything is published.
  push:
    tags:
      - 'v*'
  # Manual fallback.
  workflow_dispatch:

permissions:
  contents: read

# Serialize the whole publish pipeline: only one CD run at a time, across BOTH tag
# pushes and manual dispatches. A ref-based group would NOT cover that race — a tag
# push (refs/tags/v*) and a workflow_dispatch (refs/heads/*) have different refs —
# so group on the workflow itself. Never cancel an in-flight publish.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

# `npm ci` installs the lockfile-pinned versions regardless of age, so the local
# .npmrc cooldown (min-release-age) does not gate it — every install is instead gated
# by `npm audit`. The remaining cooldown only affects the global `npm install -g`
# tooling here, which we deliberately leave subject to it.
env:
  # `npm ci` wipes node_modules, so cache npm's download directory instead. Point it at a
  # workspace-local path that is writable in every job (including the browser-cdn container).
  NPM_CONFIG_CACHE: ${{ github.workspace }}/.npm

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        java-version: [21]
        node-version: [24.x]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'microsoft'
          java-version: ${{ matrix.java-version }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: 'https://registry.npmjs.org'
      - run: java -version
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: cache-root
        with:
          path: ${{ github.workspace }}/.npm
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-root-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-root-
      - run: npm audit --package-lock-only
      - run: npm ci
      # Use the lockfile-pinned generator (a devDependency), not an unpinned global
      # `npm install -g @latest`. npx resolves to the local node_modules copy, so the
      # version is reproducible, audited (it's in the lockfile), and bumped via Dependabot.
      - run: npx @openapitools/openapi-generator-cli version
      - run: npm run openapi:set:version
      - run: npm run openapi:generate
      - run: npm run build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.java-version }}-${{ matrix.node-version }}
          path: dist/
          retention-days: 1

  test-unit:
    needs: build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        java-version: [21]
        node-version: [24.x]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.java-version }}-${{ matrix.node-version }}
          path: dist/
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: cache-root-test
        with:
          path: ${{ github.workspace }}/.npm
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-root-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-root-
      - run: npm audit --package-lock-only
      - run: npm ci
      - run: npm run test

  test-nodejs-javascript:
    needs: build
    runs-on: ubuntu-latest
    # Hits a live mainnet node; deterministic coverage is in test-unit, so don't
    # let external flakiness block publishing.
    continue-on-error: true

    strategy:
      matrix:
        java-version: [21]
        node-version: [24.x]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.java-version }}-${{ matrix.node-version }}
          path: dist/
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: cache-nodejs-javascript
        with:
          path: ${{ github.workspace }}/.npm
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-nodejs-javascript-${{ hashFiles('tests/nodejs-javascript/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-nodejs-javascript-
      - run: npm audit --package-lock-only
        working-directory: ./tests/nodejs-javascript
      - run: npm ci
        working-directory: ./tests/nodejs-javascript
      - run: npm test
        working-directory: ./tests/nodejs-javascript

  test-nodejs-typescript:
    needs: build
    runs-on: ubuntu-latest
    # Hits a live mainnet node; deterministic coverage is in test-unit, so don't
    # let external flakiness block publishing.
    continue-on-error: true

    strategy:
      matrix:
        java-version: [21]
        node-version: [24.x]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.java-version }}-${{ matrix.node-version }}
          path: dist/
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: cache-nodejs-typescript
        with:
          path: ${{ github.workspace }}/.npm
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-nodejs-typescript-${{ hashFiles('tests/nodejs-typescript/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-nodejs-typescript-
      - run: npm audit --package-lock-only
        working-directory: ./tests/nodejs-typescript
      - run: npm ci
        working-directory: ./tests/nodejs-typescript
      - run: npm test
        working-directory: ./tests/nodejs-typescript

  test-browser-cdn:
    needs: build
    runs-on: ubuntu-latest
    # Hits a live mainnet node; deterministic coverage is in test-unit, so don't
    # let external flakiness block publishing.
    continue-on-error: true
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
      options: --user 1001

    strategy:
      matrix:
        java-version: [21]
        node-version: [24.x]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.java-version }}-${{ matrix.node-version }}
          path: dist/
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: cache-browser-cdn
        with:
          path: ${{ github.workspace }}/.npm
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-browser-cdn-${{ hashFiles('tests/browser-cdn/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-browser-cdn-
      - run: npm audit --package-lock-only
        working-directory: ./tests/browser-cdn
      - run: npm ci
        working-directory: ./tests/browser-cdn
      - run: npm run test
        working-directory: ./tests/browser-cdn

  publish:
    needs: [test-unit, test-nodejs-javascript, test-nodejs-typescript, test-browser-cdn]
    runs-on: ubuntu-latest
    # Manual approval gate: configure the `release` environment with required reviewers
    # in GitHub repo settings. Also set this same environment name in the npm Trusted
    # Publisher config so only runs that passed this gate can publish.
    environment: release
    permissions:
      contents: read
      id-token: write # Required for npm Trusted Publishing (OIDC). No NPM_TOKEN needed.

    strategy:
      matrix:
        java-version: [21]
        node-version: [24.x]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: 'https://registry.npmjs.org'
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.java-version }}-${{ matrix.node-version }}
          path: dist/
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: cache-root-publish
        with:
          path: ${{ github.workspace }}/.npm
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-root-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-root-
      - run: npm audit --package-lock-only
      - run: npm ci
      # Trusted Publishing (OIDC) requires npm >= 11.5.1, which ships by default with
      # Node.js 24.x — so we do NOT `npm install -g npm@latest` (that would add a
      # fresh, unpinned global package to the privileged id-token step). Just assert
      # the bundled npm meets the minimum and fail fast otherwise.
      - run: |
          npm --version
          printf '11.5.1\n%s\n' "$(npm -v)" | sort -V -C \
            || { echo "npm $(npm -v) < 11.5.1 (required for OIDC Trusted Publishing)"; exit 1; }
      # No NODE_AUTH_TOKEN: npm exchanges the GitHub OIDC token for a short-lived
      # publish credential. --provenance attaches a verifiable build provenance attestation.
      - run: npm publish --access=public --provenance
        working-directory: ./dist
