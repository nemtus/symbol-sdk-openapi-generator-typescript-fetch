# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# This repo has FOUR separate npm projects (each with its own package.json /
# package-lock.json): the root, plus the three consumer test suites under tests/.
# They are NOT an npm workspace, so each needs its own Dependabot entry.
# All entries: check daily (so security updates, which are NOT subject to cooldown,
# surface immediately) with a 7-day cooldown on regular version bumps, and bundle
# non-major (minor + patch) updates into a single grouped PR.

version: 2
updates:
  # ---- root npm ----
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'daily'
    cooldown:
      default-days: 7
    groups:
      npm-minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch

  # ---- test suite: tests/nodejs-javascript ----
  - package-ecosystem: 'npm'
    directory: '/tests/nodejs-javascript'
    schedule:
      interval: 'daily'
    cooldown:
      default-days: 7
    groups:
      npm-minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch

  # ---- test suite: tests/nodejs-typescript ----
  - package-ecosystem: 'npm'
    directory: '/tests/nodejs-typescript'
    schedule:
      interval: 'daily'
    cooldown:
      default-days: 7
    groups:
      npm-minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch

  # ---- test suite: tests/browser-cdn ----
  # `@playwright/test` / `playwright` are NOT ignored: ignoring them would also
  # suppress Dependabot security-update PRs, so a Playwright vulnerability could land
  # unnoticed. These npm packages are coupled to the Playwright CONTAINER tag
  # (mcr.microsoft.com/playwright:vX.Y.Z-noble in
  # .github/workflows/{ci-nodejs,cd-publish-to-npm}.yml), which Dependabot cannot edit
  # directly. The `detect-playwright-version` job in both workflows derives that tag from
  # the locked `playwright` version in tests/browser-cdn, so the container auto-syncs to
  # whatever Dependabot bumps the npm package to (see tests/CLAUDE.md) — no manual tag
  # edit, no version drift.
  - package-ecosystem: 'npm'
    directory: '/tests/browser-cdn'
    schedule:
      interval: 'daily'
    cooldown:
      default-days: 7
    groups:
      npm-minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch

  # ---- github actions ----
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'daily'
    cooldown:
      default-days: 7
